<!DOCTYPE html>
<html>
<head>
    <title>Wallet - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body {
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo:</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Ingresar correo"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Ingresar contraseña"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div id="mensaje" class="mt-3"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#loginForm').submit(function(event) {
            event.preventDefault();

            const email = $('#email').val();
            const password = $('#password').val();

            const emailCorrecto = 'admin@wallet.com';
            const passwordCorrecta = '123456';

            if (email === emailCorrecto && password === passwordCorrecta) {
                $('#mensaje').html(
                    '<div class="alert alert-success">Inicio de sesión exitoso. Redirigiendo...</div>'
                );

                setTimeout(function() {
                    window.location.href = 'menu.html';
                }, 1500);
            } else {
                $('#mensaje').html(
                    '<div class="alert alert-danger">Email o contraseña incorrectos.</div>'
                );
            }
        });
    </script>
</body>
</html>
